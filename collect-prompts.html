<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mersad | Test Case Collector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #010409; color: #c9d1d9; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        pre { background: #0d1117; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; border: 1px solid #30363d; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-3xl glass p-6 rounded-xl shadow-2xl border-t-4 border-t-purple-500">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-2xl font-bold text-purple-400">Test Case Collector</h1>
                <p class="text-xs text-gray-500 mt-1">Submit prompts to build our evaluation dataset.</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Environment</span>
                <div class="flex items-center gap-2 justify-end">
                    <span class="status-dot bg-green-500"></span>
                    <span class="text-xs font-bold text-gray-400">Production</span>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Prompt / Test Case</label>
                <textarea id="prompt" rows="5" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-3 focus:ring-2 focus:ring-purple-500 outline-none text-sm transition-all" placeholder="Enter a claim or text that a user might input..."></textarea>
            </div>

            <div class="flex items-center justify-between bg-[#0d1117] p-3 rounded-lg border border-[#30363d]">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="debug" checked class="w-4 h-4 rounded border-gray-300 text-purple-600 focus:ring-purple-500 bg-[#0d1117]">
                    <span class="text-sm text-gray-400">Debug Mode (Mock Analysis)</span>
                </label>
                <span class="text-[10px] text-gray-600 font-bold uppercase">Automated Storage Enabled</span>
            </div>

            <button id="submitBtn" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-lg transition-all active:scale-[0.98] flex items-center justify-center gap-3 group">
                <span>Submit & Run Test</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
                <span id="loader" class="hidden animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
            </button>
        </div>

        <div id="statusContainer" class="mt-6 space-y-2 hidden">
            <div id="dbStatus" class="flex items-center gap-2 text-xs">
                <span class="status-dot bg-gray-600"></span>
                <span class="text-gray-400">Saving to database...</span>
            </div>
            <div id="apiStatus" class="flex items-center gap-2 text-xs">
                <span class="status-dot bg-gray-600"></span>
                <span class="text-gray-400">Running analysis...</span>
            </div>
        </div>

        <div id="resultContainer" class="mt-8 hidden animate-in fade-in slide-in-from-bottom-4">
            <h2 class="text-xs font-bold uppercase tracking-widest text-purple-400 mb-2">Analysis Result</h2>
            <pre id="responseOutput" class="text-xs text-purple-300 border-purple-900/30"></pre>
        </div>
        
        <div id="errorContainer" class="mt-8 hidden">
            <h2 class="text-xs font-bold uppercase tracking-widest text-red-400 mb-2">Submission Error</h2>
            <div id="errorOutput" class="bg-red-900/20 border border-red-900/50 p-4 rounded-lg text-xs text-red-400"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nrbfewztwiocubqbhhwd.supabase.co';
        const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yYmZld3p0d2lvY3VicWJoaHdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzEyNDksImV4cCI6MjA4OTI0NzI0OX0.whwqbZKEWXHesGwOwEW1df0mzlUR4aYh3G0SJb8dF5U';
        
        const ANALYZE_URL = `${SUPABASE_URL}/functions/v1/analyze`;
        const DB_URL = `${SUPABASE_URL}/rest/v1/test_cases`;

        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const statusContainer = document.getElementById('statusContainer');
        const dbStatus = document.getElementById('dbStatus');
        const apiStatus = document.getElementById('apiStatus');
        const resultContainer = document.getElementById('resultContainer');
        const responseOutput = document.getElementById('responseOutput');
        const errorContainer = document.getElementById('errorContainer');
        const errorOutput = document.getElementById('errorOutput');

        const updateStatus = (el, status, text) => {
            const dot = el.querySelector('.status-dot');
            const label = el.querySelector('span:not(.status-dot)');
            label.textContent = text;
            dot.className = `status-dot ${status === 'loading' ? 'bg-yellow-500 animate-pulse' : status === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
        };

        submitBtn.addEventListener('click', async () => {
            const promptValue = document.getElementById('prompt').value;
            const debugValue = document.getElementById('debug').checked;

            if (!promptValue.trim()) {
                alert('Please enter a prompt.');
                return;
            }

            // UI Reset
            submitBtn.disabled = true;
            loader.classList.remove('hidden');
            statusContainer.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');
            
            updateStatus(dbStatus, 'loading', 'Saving to database...');
            updateStatus(apiStatus, 'loading', 'Waiting for analysis...');

            try {
                // 1. Save to Database
                const dbResponse = await fetch(DB_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ prompt: promptValue })
                });

                if (!dbResponse.ok) throw new Error('Failed to save to database');
                updateStatus(dbStatus, 'success', 'Saved to database');

                // 2. Run Analysis
                const apiResponse = await fetch(ANALYZE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`,
                        'apikey': API_KEY
                    },
                    body: JSON.stringify({
                        prompt: promptValue,
                        debug: debugValue
                    })
                });

                const data = await apiResponse.json();

                if (!apiResponse.ok) {
                    throw new Error(data.error || `Analysis failed: ${apiResponse.status}`);
                }

                updateStatus(apiStatus, 'success', 'Analysis complete');
                responseOutput.textContent = JSON.stringify(data, null, 2);
                resultContainer.classList.remove('hidden');
                
                // Optional: Clear prompt after success
                document.getElementById('prompt').value = '';

            } catch (error) {
                console.error('Operation failed:', error);
                errorOutput.textContent = error.message;
                errorContainer.classList.remove('hidden');
                
                if (dbStatus.querySelector('.bg-yellow-500')) updateStatus(dbStatus, 'error', 'Database error');
                if (apiStatus.querySelector('.bg-yellow-500')) updateStatus(apiStatus, 'error', 'API error');
            } finally {
                submitBtn.disabled = false;
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
